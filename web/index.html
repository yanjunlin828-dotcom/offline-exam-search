<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>离线资料检索</title>
  <link rel="stylesheet" href="web/highlight-theme.css">
  <link rel="stylesheet" href="web/katex.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 1rem 1.2rem 3rem;
      color: #24292e;
      background: #fff;
    }
    h1 { font-size: 1.3rem; margin: 0 0 1rem; color: #333; }

    /* ── search bar ── */
    #search-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.8rem;
    }
    #q {
      flex: 1;
      min-width: 220px;
      padding: 0.45rem 0.6rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      outline: none;
    }
    #q:focus { border-color: #0078d7; box-shadow: 0 0 0 2px #cce4ff; }
    #search-btn {
      padding: 0.45rem 1.1rem;
      font-size: 1rem;
      cursor: pointer;
      background: #0078d7;
      color: #fff;
      border: none;
      border-radius: 4px;
    }
    #search-btn:hover { background: #005fa3; }

    /* ── type toggle ── */
    #type-toggle { display: flex; gap: 0.3rem; }
    #type-toggle button {
      padding: 0.3rem 0.75rem;
      font-size: 0.88rem;
      cursor: pointer;
      border: 1px solid #bbb;
      background: #f5f5f5;
      border-radius: 3px;
      color: #444;
    }
    #type-toggle button.active {
      background: #0078d7;
      color: #fff;
      border-color: #0078d7;
    }

    /* ── files-btn（资料范围） ── */
    #files-btn {
      padding: 0.3rem 0.75rem;
      font-size: 0.88rem;
      cursor: pointer;
      border: 1px solid #bbb;
      background: #f5f5f5;
      border-radius: 3px;
      color: #444;
      white-space: nowrap;
    }
    #files-btn:hover { background: #eaeaea; }
    #files-btn.filtered { border-color: #0078d7; color: #0078d7; }

    /* ── 资料范围面板 ── */
    .files-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .files-overlay[hidden] { display: none; }
    .files-panel {
      background: #fff;
      border-radius: 8px;
      width: 420px;
      max-width: 90vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
    }
    .files-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1rem;
      border-bottom: 1px solid #e1e4e8;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .files-panel-actions button {
      margin-left: 0.4rem;
      padding: 0.2rem 0.6rem;
      font-size: 0.8rem;
      cursor: pointer;
      border: 1px solid #bbb;
      background: #f5f5f5;
      border-radius: 3px;
      color: #444;
    }
    .files-list { flex: 1; overflow-y: auto; padding: 0.4rem 1rem; }
    .files-list-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.32rem 0;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .files-list-row input { cursor: pointer; }
    .files-list-empty { color: #888; font-size: 0.88rem; padding: 1rem 0; }
    .files-panel-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 1rem;
      border-top: 1px solid #e1e4e8;
      font-size: 0.85rem;
      color: #666;
    }
    .files-panel-footer button {
      padding: 0.35rem 0.9rem;
      font-size: 0.88rem;
      cursor: pointer;
      border-radius: 4px;
      margin-left: 0.5rem;
    }
    #files-cancel { border: 1px solid #bbb; background: #f5f5f5; color: #444; }
    #files-apply  { border: none; background: #0078d7; color: #fff; }
    #files-apply:hover { background: #005fa3; }

    /* ── status line ── */
    #status {
      font-size: 0.88rem;
      color: #666;
      margin-bottom: 0.6rem;
      min-height: 1.2em;
    }

    /* ── file group ── */
    .file-group {
      margin-bottom: 1rem;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      overflow: hidden;
    }
    .file-group summary {
      cursor: pointer;
      padding: 0.5rem 0.8rem;
      background: #f6f8fa;
      font-weight: 600;
      font-size: 1.1rem;
      color: #0366d6;
      user-select: none;
      list-style: none;
    }
    .file-group summary::-webkit-details-marker { display: none; }
    .file-group summary::before {
      content: '▾ ';
      font-size: 0.75rem;
      color: #888;
    }
    .file-group[open] summary::before { content: '▴ '; }

    /* ── result item ── */
    .result-item {
      padding: 0.6rem 0.9rem;
      border-top: 1px solid #e1e4e8;
    }
    .result-header {
      font-size: 0.84rem;
      color: #586069;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.45rem;
    }
    .ctype-badge {
      display: inline-block;
      padding: 0.08rem 0.5rem;
      border-radius: 3px;
      font-size: 0.76rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .ctype-prose { background: #d4edda; color: #155724; }
    .ctype-code  { background: #cce5ff; color: #004085; }
    .heading-path {
      color: #1a1a1a;
      font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, 'Segoe UI', sans-serif;
      font-size: 1rem;
      font-weight: 700;
    }
    .heading-path mark {
      background: #fff176;
      padding: 0 1px;
      border-radius: 2px;
    }
    .score { color: #888; font-size: 0.8rem; }

    /* ── text body（渲染后的 Markdown） ── */
    .result-text {
      font-size: 0.9rem;
      line-height: 1.6;
      word-break: break-word;
      overflow-x: auto;
    }
    .result-text mark {
      background: #fff176;
      padding: 0 1px;
      border-radius: 2px;
    }
    .result-text p { margin: 0.3em 0; }
    .result-text p:first-child { margin-top: 0; }
    .result-text p:last-child { margin-bottom: 0; }
    .result-text ul, .result-text ol { margin: 0.3em 0; padding-left: 1.4em; }
    .result-text pre {
      margin: 0.3em 0;
      white-space: pre;
      background: #f6f8fa;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      padding: 0.7em 0.9em;
    }
    .result-text pre code { word-break: normal; background: none; padding: 0; }
    .result-text code {
      background: #f3f4f6;
      padding: 0.1em 0.3em;
      border-radius: 3px;
      font-family: 'Consolas', 'SFMono-Regular', monospace;
      font-size: 0.87em;
    }
    .result-text table { border-collapse: collapse; margin: 0.3em 0; }
    .result-text th, .result-text td { border: 1px solid #dfe2e5; padding: 0.3em 0.6em; }
    .result-text th { background: #f6f8fa; font-weight: 600; }
    .result-text blockquote {
      border-left: 4px solid #dfe2e5;
      margin: 0.3em 0;
      padding: 0 0.9em;
      color: #6a737d;
    }
    .result-text .katex-display { overflow-x: auto; margin: 0.3em 0; }

    /* ── 关键词标黄常驻开关（跨页面共享状态，见 web/markdown-render.js） ── */
    #highlight-toggle {
      position: fixed;
      right: 1.2rem;
      bottom: 1.2rem;
      z-index: 999;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 20px;
      background: #fff;
      color: #555;
      box-shadow: 0 1px 6px rgba(0,0,0,0.15);
    }
    #highlight-toggle.active {
      background: #fff176;
      border-color: #e6c200;
      color: #4d3b00;
    }
    html.no-highlight mark { background: transparent; color: inherit; }

    .no-result { color: #666; padding: 1rem 0; }
    .view-btn {
      display: inline-block;
      margin-top: 0.4rem;
      font-size: 0.78rem;
      color: #0366d6;
      text-decoration: none;
      padding: 0.15rem 0.5rem;
      border: 1px solid #c8e1ff;
      border-radius: 3px;
      background: #f1f8ff;
    }
    .view-btn:hover { background: #dbedff; }
  </style>
</head>
<body>
  <h1>离线资料检索</h1>

  <div id="search-bar">
    <input id="q" type="text" placeholder="输入查询词，回车或点击搜索…" autocomplete="off">
    <div id="type-toggle">
      <button data-type="all"   class="active">全部</button>
      <button data-type="prose">只看概念</button>
      <button data-type="code" >只看代码</button>
    </div>
    <button id="files-btn" type="button">资料范围</button>
    <button id="search-btn">搜索</button>
  </div>

  <div id="status"></div>
  <div id="results"></div>

  <div id="files-overlay" class="files-overlay" hidden>
    <div class="files-panel">
      <div class="files-panel-header">
        <span>选择参与搜索的文件</span>
        <div class="files-panel-actions">
          <button id="files-select-all" type="button">全选</button>
          <button id="files-select-none" type="button">全不选</button>
        </div>
      </div>
      <div id="files-list" class="files-list"></div>
      <div class="files-panel-footer">
        <span id="files-summary"></span>
        <div>
          <button id="files-cancel" type="button">取消</button>
          <button id="files-apply" type="button">应用</button>
        </div>
      </div>
    </div>
  </div>

  <button id="highlight-toggle" type="button">关键词标黄</button>

  <script src="web/marked.min.js"></script>
  <script src="web/katex.min.js"></script>
  <script src="web/highlight.min.js"></script>
  <script src="web/markdown-render.js"></script>
  <script>
  (function () {
    'use strict';

    var WINDOW_THRESHOLD = 600;   // 超过此长度才做窗口截取
    var WINDOW_CONTEXT   = 200;   // 关键词前后各展示的字符数
    var FILES_STORAGE_KEY = 'examSearch.deselectedFiles';  // 资料范围选择的本地持久化 key

    var activeType    = 'all';
    var userOverride   = false;   // true = 用户手动点过筛选按钮，意图识别不应再覆盖

    var ALL_FILES        = [];          // [{file, chunks}]，来自 /api/files
    var deselectedFiles  = new Set();   // 已生效的"取消勾选"文件集合（持久化）
    var draftDeselected  = new Set();   // 面板打开期间的编辑态，点"应用"才提交

    // ── type toggle ──────────────────────────────────────────────────────────

    document.querySelectorAll('#type-toggle button').forEach(function (btn) {
      btn.addEventListener('click', function () {
        userOverride = true;
        setActiveType(btn.dataset.type);
      });
    });

    function setActiveType(type) {
      activeType = type;
      document.querySelectorAll('#type-toggle button').forEach(function (b) {
        b.classList.toggle('active', b.dataset.type === type);
      });
    }

    // ── 关键词标黄开关（状态跨 index.html / viewer.html 共享） ──────────────────

    MDRender.initHighlightToggle(document.getElementById('highlight-toggle'));

    // ── 资料范围面板（选择参与搜索的源文件） ──────────────────────────────────────
    //
    // 设计取舍：选择结果存 localStorage（跨页面/跨会话的"标准搜索范围"偏好），
    // 不写入 URL —— 它是一个全局设置，不是某次查询的可分享状态（type/manual 才是）。
    // 未勾选任何文件时显式传 files=（空字符串），后端按"返回空结果"处理；
    // 全部勾选（deselectedFiles 为空）时不传 files 参数，等价于不限制（默认行为）。

    function loadDeselectedFromStorage() {
      var validFiles = new Set(ALL_FILES.map(function (f) { return f.file; }));
      var saved = [];
      try {
        var raw = localStorage.getItem(FILES_STORAGE_KEY);
        if (raw) saved = JSON.parse(raw);
      } catch (e) {
        saved = [];
      }
      // 过滤掉索引重建后已不存在的文件名，避免"全选"按钮失真
      deselectedFiles = new Set(saved.filter(function (f) { return validFiles.has(f); }));
    }

    function saveDeselectedToStorage() {
      try {
        localStorage.setItem(FILES_STORAGE_KEY, JSON.stringify(Array.from(deselectedFiles)));
      } catch (e) {
        // 隐私模式等场景 localStorage 不可用时静默忽略，不影响本次会话内的过滤功能
      }
    }

    function fetchFilesList() {
      return fetch('/api/files')
        .then(function (resp) {
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          return resp.json();
        })
        .then(function (data) {
          ALL_FILES = data.files || [];
          loadDeselectedFromStorage();
          updateFilesBtnLabel();
        })
        .catch(function (err) {
          console.error('加载资料文件列表失败：', err);
          ALL_FILES = [];
        });
    }

    function updateFilesBtnLabel() {
      var btn = document.getElementById('files-btn');
      var total = ALL_FILES.length;
      var selected = total - deselectedFiles.size;
      if (!total || selected === total) {
        btn.textContent = '资料范围';
        btn.classList.remove('filtered');
      } else {
        btn.textContent = '资料范围 (' + selected + '/' + total + ')';
        btn.classList.add('filtered');
      }
    }

    function updateFilesSummary() {
      var total = ALL_FILES.length;
      var selected = total - draftDeselected.size;
      document.getElementById('files-summary').textContent =
        '已选 ' + selected + ' / ' + total + ' 个文件';
    }

    function renderFilesPanel() {
      var listEl = document.getElementById('files-list');
      listEl.innerHTML = '';

      if (!ALL_FILES.length) {
        var empty = document.createElement('div');
        empty.className = 'files-list-empty';
        empty.textContent = '未能加载文件列表（索引可能为空，或服务未正常启动）。';
        listEl.appendChild(empty);
        updateFilesSummary();
        return;
      }

      ALL_FILES.forEach(function (item) {
        var row = document.createElement('label');
        row.className = 'files-list-row';

        var checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = !draftDeselected.has(item.file);
        checkbox.addEventListener('change', function () {
          if (checkbox.checked) {
            draftDeselected.delete(item.file);
          } else {
            draftDeselected.add(item.file);
          }
          updateFilesSummary();
        });

        var label = document.createElement('span');
        label.textContent = displayFileName(item.file) + '（' + item.chunks + ' 块）';

        row.appendChild(checkbox);
        row.appendChild(label);
        listEl.appendChild(row);
      });

      updateFilesSummary();
    }

    function openFilesPanel() {
      draftDeselected = new Set(deselectedFiles);
      renderFilesPanel();
      document.getElementById('files-overlay').hidden = false;
    }

    function closeFilesPanel() {
      document.getElementById('files-overlay').hidden = true;
    }

    document.getElementById('files-btn').addEventListener('click', openFilesPanel);
    document.getElementById('files-cancel').addEventListener('click', closeFilesPanel);

    document.getElementById('files-overlay').addEventListener('click', function (e) {
      if (e.target === e.currentTarget) closeFilesPanel();
    });

    document.getElementById('files-select-all').addEventListener('click', function () {
      draftDeselected.clear();
      renderFilesPanel();
    });

    document.getElementById('files-select-none').addEventListener('click', function () {
      ALL_FILES.forEach(function (f) { draftDeselected.add(f.file); });
      renderFilesPanel();
    });

    document.getElementById('files-apply').addEventListener('click', function () {
      deselectedFiles = new Set(draftDeselected);
      saveDeselectedToStorage();
      updateFilesBtnLabel();
      closeFilesPanel();

      var q = document.getElementById('q').value.trim();
      if (q) executeSearch(q);  // 范围变化不计入"用户改了类型筛选"，不重写 history
    });

    // 搜索请求里 files 参数的值：null = 不传（不限制）；字符串（可为空）= 显式限定
    function getFilesParam() {
      if (deselectedFiles.size === 0) return null;
      var selected = ALL_FILES
        .map(function (f) { return f.file; })
        .filter(function (f) { return !deselectedFiles.has(f); });
      return selected.join(',');
    }

    // ── search triggers ──────────────────────────────────────────────────────

    document.getElementById('search-btn').addEventListener('click', doSearch);
    document.getElementById('q').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doSearch();
    });

    // ── main search ──────────────────────────────────────────────────────────

    // 用户主动搜索：写入 URL 历史，再执行搜索
    function doSearch() {
      var q = document.getElementById('q').value.trim();
      if (!q) return;

      // 上次搜索若是"意图自动切换"而非用户手动选择，本次重新从"全部"开始判断，
      // 避免上一条查询残留的 code/prose 过滤继续套用到这条完全不相关的新查询上
      if (!userOverride) setActiveType('all');

      var params = new URLSearchParams();
      params.set('q', q);
      params.set('type', activeType);
      params.set('manual', userOverride ? '1' : '0');
      history.pushState(null, '', '?' + params.toString());

      executeSearch(q);
    }

    // 实际发请求、渲染结果，不操作 history（供 doSearch 和 popstate 共用）
    function executeSearch(q) {
      var statusEl  = document.getElementById('status');
      var resultsEl = document.getElementById('results');
      statusEl.textContent  = '搜索中…';
      resultsEl.innerHTML   = '';

      var url = '/search?q=' + encodeURIComponent(q) + '&type=' + activeType;
      var filesParam = getFilesParam();
      if (filesParam !== null) url += '&files=' + encodeURIComponent(filesParam);

      fetch(url)
        .then(function (resp) {
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          return resp.json();
        })
        .then(function (data) {
          // 根据服务端意图自动切换类型（软偏好）；用户手动选过筛选项时不再覆盖
          if (!userOverride) setActiveType(data.intent || 'all');

          var intentNote = data.intent
            ? '（意图：' + data.intent + '）'
            : '';
          statusEl.textContent = '共 ' + data.results.length + ' 条结果 ' + intentNote;

          renderResults(data.results, data.query);
        })
        .catch(function (err) {
          statusEl.textContent = '搜索失败：' + err.message;
        });
    }

    // ── 浏览器前进 / 后退 ────────────────────────────────────────────────────

    window.addEventListener('popstate', function () {
      var params = new URLSearchParams(window.location.search);
      var q    = params.get('q') || '';
      var type = params.get('type') || 'all';

      userOverride = params.get('manual') === '1';
      document.getElementById('q').value = q;
      if (['all', 'prose', 'code'].indexOf(type) !== -1) {
        setActiveType(type);
      }

      if (q) {
        executeSearch(q);
      } else {
        document.getElementById('results').innerHTML = '';
        document.getElementById('status').textContent = '';
      }
    });

    // ── 刷新 / 直接访问带参数 URL 时恢复状态 ────────────────────────────────
    //
    // 必须等 /api/files 加载完（资料范围偏好才能从 localStorage 正确还原），
    // 否则首次搜索会在 deselectedFiles 为空的状态下发出，短暂忽略已保存的范围选择。

    function restoreFromUrl() {
      var params = new URLSearchParams(window.location.search);
      var q    = params.get('q') || '';
      var type = params.get('type') || 'all';

      userOverride = params.get('manual') === '1';
      if (['all', 'prose', 'code'].indexOf(type) !== -1) {
        setActiveType(type);
      }
      if (q) {
        document.getElementById('q').value = q;
        executeSearch(q);
      }
    }

    fetchFilesList().then(restoreFromUrl);

    // ── html helpers ─────────────────────────────────────────────────────────

    function escapeHtml(s) {
      return s
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/"/g,  '&quot;');
    }

    // 文件路径展示时去掉最外层目录名（如 "final/8. xxx.md" 只显示 "8. xxx.md"）；
    // 跳转用的 viewUrl 仍用完整 file 路径，截断只影响这里展示的文字。
    function displayFileName(file) {
      var idx = file.indexOf('/');
      return idx === -1 ? file : file.slice(idx + 1);
    }

    var HEADING_DISPLAY_MAX_LEVEL = 2;  // 只展示 Markdown 标题级别 <= 此值的部分（# / ##）

    // 按真实 Markdown 标题级别截断 heading_path 展示文字（不是按数组长度）——
    // 同一篇文档可能从 H1 或直接从 H2 开始，"显示到第二级"必须按 heading_levels
    // 里记录的实际 # 个数过滤，而不是简单取前 N 段。
    // levels 缺失（旧索引未重建）时退化为不截断，保证向后兼容不报错。
    function truncateHeadingPath(path, levels, maxLevel) {
      if (!path) return path;
      var parts = path.split(' > ');
      if (!levels || levels.length !== parts.length) return path;

      var kept = parts.filter(function (_, i) { return levels[i] <= maxLevel; });
      if (!kept.length) return parts[parts.length - 1];  // 全部更深时至少保留叶子标题
      return kept.join(' > ');
    }

    // 标题是纯文本（非 Markdown），命中查询词时直接转义+包 <mark>，
    // 用合并区间而非逐词替换，避免中文 bigram 互相重叠时产生破损标签。
    function highlightPlainText(text, tokens) {
      if (!tokens || !tokens.length) return escapeHtml(text);

      var lower  = text.toLowerCase();
      var ranges = [];
      tokens.forEach(function (tok) {
        if (!tok) return;
        var tlow = tok.toLowerCase();
        var idx = 0;
        while (true) {
          var pos = lower.indexOf(tlow, idx);
          if (pos === -1) break;
          ranges.push([pos, pos + tok.length]);
          idx = pos + 1;
        }
      });
      if (!ranges.length) return escapeHtml(text);

      ranges.sort(function (a, b) { return a[0] - b[0]; });
      var merged = [ranges[0].slice()];
      for (var i = 1; i < ranges.length; i++) {
        var last = merged[merged.length - 1];
        if (ranges[i][0] <= last[1]) {
          last[1] = Math.max(last[1], ranges[i][1]);
        } else {
          merged.push(ranges[i].slice());
        }
      }

      var out = '';
      var cursor = 0;
      merged.forEach(function (r) {
        out += escapeHtml(text.slice(cursor, r[0]));
        out += '<mark>' + escapeHtml(text.slice(r[0], r[1])) + '</mark>';
        cursor = r[1];
      });
      out += escapeHtml(text.slice(cursor));
      return out;
    }

    // prose：跑一遍 Markdown（含公式）渲染，再在渲染后的 DOM 上按文本节点
    // 查找并包裹 <mark>——不能在原始文本上先插 <mark> 再渲染，标签会被 marked 破坏。
    function renderProse(text, tokens) {
      var div = document.createElement('div');
      div.innerHTML = MDRender.renderMarkdownToHtml(text);
      MDRender.highlightTerms(div, tokens);
      return div.innerHTML;
    }

    // code: 交给 hljs 着色，不叠加 <mark>
    function renderCode(text) {
      var highlighted;
      if (window.hljs && typeof window.hljs.highlightAuto === 'function') {
        highlighted = window.hljs.highlightAuto(text).value;
      } else {
        highlighted = escapeHtml(text);
      }
      return '<pre><code class="hljs">' + highlighted + '</code></pre>';
    }

    // ── windowing ────────────────────────────────────────────────────────────

    // 对过长的 prose 文本，找第一个匹配 token 位置，截取前后 WINDOW_CONTEXT 字符，
    // 但把截断点snap到最近的换行处——避免切到表格行/列表项/加粗标记中间，
    // 导致截断后的文本喂给 marked 渲染时格式错乱。
    function applyWindow(text, tokens) {
      if (text.length <= WINDOW_THRESHOLD) return text;

      var lower = text.toLowerCase();
      var firstPos = -1;
      (tokens || []).forEach(function (tok) {
        if (!tok) return;
        var pos = lower.indexOf(tok.toLowerCase());
        if (pos !== -1 && (firstPos === -1 || pos < firstPos)) firstPos = pos;
      });

      if (firstPos === -1) {
        var cut = text.lastIndexOf('\n', WINDOW_THRESHOLD);
        if (cut <= 0) cut = WINDOW_THRESHOLD;
        return text.slice(0, cut) + '\n…';
      }

      var start = Math.max(0, firstPos - WINDOW_CONTEXT);
      var end   = Math.min(text.length, firstPos + WINDOW_CONTEXT);

      var snappedStart = start === 0 ? 0 : (text.lastIndexOf('\n', start) + 1);
      var newlineAfterEnd = text.indexOf('\n', end);
      var snappedEnd = newlineAfterEnd === -1 ? text.length : newlineAfterEnd;

      var prefix = snappedStart > 0 ? '…\n' : '';
      var suffix = snappedEnd < text.length ? '\n…' : '';
      return prefix + text.slice(snappedStart, snappedEnd) + suffix;
    }

    // ── render ───────────────────────────────────────────────────────────────

    function renderResults(results, query) {
      var container = document.getElementById('results');
      container.innerHTML = '';

      if (!results || results.length === 0) {
        var msg = document.createElement('p');
        msg.className   = 'no-result';
        msg.textContent = '未找到相关结果。';
        container.appendChild(msg);
        return;
      }

      // 按 file 分组（保持结果顺序，第一次出现的文件排前）
      var groups     = {};
      var groupOrder = [];
      results.forEach(function (r) {
        if (!groups[r.file]) {
          groups[r.file] = [];
          groupOrder.push(r.file);
        }
        groups[r.file].push(r);
      });

      groupOrder.forEach(function (file) {
        var items   = groups[file];
        var details = document.createElement('details');
        details.className = 'file-group';
        details.open      = true;

        // 文件标题行：文件名 + 查看全文按钮（同标签页跳转，返回时自动恢复搜索）
        // hl 汇总该文件下所有结果的 matched_tokens（含别名命中词），供 viewer 高亮
        var fileTokens = [];
        items.forEach(function (it) {
          (it.matched_tokens || []).forEach(function (t) {
            if (fileTokens.indexOf(t) === -1) fileTokens.push(t);
          });
        });
        var summary = document.createElement('summary');
        var viewUrl = '/view?path=' + encodeURIComponent(file)
                    + '&q=' + encodeURIComponent(query)
                    + '&hl=' + encodeURIComponent(fileTokens.join(','))
                    + '&type=' + encodeURIComponent(activeType)
                    + '&manual=' + (userOverride ? '1' : '0');
        summary.innerHTML = escapeHtml(displayFileName(file)) + '（' + items.length + ' 条）'
          + '&nbsp;<a class="view-btn" href="' + escapeHtml(viewUrl) + '">查看全文 ↗</a>';
        details.appendChild(summary);

        items.forEach(function (item) {
          var div = document.createElement('div');
          div.className = 'result-item';

          // 标题行：类型徽章 + 章节路径 + 分数
          var header = document.createElement('div');
          header.className = 'result-header';
          var badge   = '<span class="ctype-badge ctype-' + item.ctype + '">'
                      + escapeHtml(item.ctype) + '</span>';
          // h 传完整 heading_path（不只是第一段），viewer 端按完整层级匹配才能跳到准确位置
          var sectionUrl = '/view?path=' + encodeURIComponent(item.file)
                         + '&q=' + encodeURIComponent(query)
                         + '&hl=' + encodeURIComponent((item.matched_tokens || []).join(','))
                         + '&h=' + encodeURIComponent(item.heading_path || '')
                         + '&type=' + encodeURIComponent(activeType)
                         + '&manual=' + (userOverride ? '1' : '0');
          var displayPath = truncateHeadingPath(
            item.heading_path, item.heading_levels, HEADING_DISPLAY_MAX_LEVEL);
          var pathStr = item.heading_path
            ? '<a class="heading-path" href="' + escapeHtml(sectionUrl) + '">'
              + highlightPlainText(displayPath, item.matched_tokens || []) + '</a>'
            : '';
          var scoreStr = '<span class="score">score&nbsp;' + item.score.toFixed(3) + '</span>';
          header.innerHTML = badge + ' ' + pathStr + ' ' + scoreStr;
          div.appendChild(header);

          // 正文片段
          var textDiv = document.createElement('div');
          textDiv.className = 'result-text';
          if (item.ctype === 'code') {
            textDiv.innerHTML = renderCode(item.text);
          } else {
            var tokens   = item.matched_tokens || [];
            var windowed = applyWindow(item.text, tokens);
            textDiv.innerHTML = renderProse(windowed, tokens);
          }
          div.appendChild(textDiv);

          details.appendChild(div);
        });

        container.appendChild(details);
      });
    }

  })();
  </script>
</body>
</html>
